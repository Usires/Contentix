<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Bibliothek — The Dirk</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f7f3ee;
      color: #2a2030;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .lib-header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid rgba(42,32,48,0.08);
    }
    .lib-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #2a2030;
      letter-spacing: -0.5px;
    }
    .lib-header p {
      font-size: 13px;
      color: #6b5f75;
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .lib-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(42,32,48,0.08);
    }

    .lib-col {
      background: #f7f3ee;
      padding: 24px 32px;
      min-height: calc(100vh - 100px);
      min-width: 0;
    }

    .col-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .col-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: #6b5f75;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .col-header .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #a78bfa;
      background: rgba(124,92,191,0.1);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .video-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .video-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      color: inherit;
    }
    .video-row:hover {
      background: rgba(124,92,191,0.06);
    }
    .video-row:active {
      background: rgba(124,92,191,0.1);
    }

    .video-row .rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #a0999f;
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    .video-row .cat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-dot.gaming { background: #e05565; }
    .cat-dot.tutorial { background: #4a90d9; }
    .cat-dot.nostalgie { background: #e87c3e; }
    .cat-dot.experiment { background: #9b6dff; }
    .cat-dot.review { background: #34d399; }
    .cat-dot.unknown { background: #a0999f; }

    /* Thumbnail */
    .video-row .thumb {
      width: 64px;
      height: 40px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e8e4f0, #d0c8e0);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-row .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-row .thumb .thumb-placeholder {
      font-size: 16px;
    }

    .video-row .title {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #2a2030;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .video-row .meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
      min-width: 60px;
    }
    .video-row .views {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #6b5f75;
    }
    .video-row .cat-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .cat-badge.gaming { background: rgba(224,85,101,0.1); color: #e05565; }
    .cat-badge.tutorial { background: rgba(74,144,217,0.1); color: #4a90d9; }
    .cat-badge.nostalgie { background: rgba(232,124,62,0.1); color: #e87c3e; }
    .cat-badge.experiment { background: rgba(155,109,255,0.1); color: #9b6dff; }
    .cat-badge.review { background: rgba(52,211,153,0.1); color: #34d399; }
    .cat-badge.unknown { background: rgba(160,153,159,0.1); color: #a0999f; }

    /* Top 3 styling */
    .video-row.top3 {
      background: rgba(124,92,191,0.04);
      padding: 12px;
    }
    .video-row.top3 .title {
      font-weight: 600;
      font-size: 15px;
      min-width: 0;
    }
    .video-row.top3:hover {
      background: rgba(124,92,191,0.1);
    }
    .video-row.top3 .rank {
      color: #7c5cbf;
      font-weight: 700;
      font-size: 12px;
    }
    .video-row.top3:nth-child(1) .rank { color: #e05565; }
    .video-row.top3:nth-child(2) .rank { color: #4a90d9; }
    .video-row.top3:nth-child(3) .rank { color: #9b6dff; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #6b5f75;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .loading::after {
      content: '...';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: #6b5f75;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .lib-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="lib-header">
  <h1>Bibliothek</h1>
  <p>Lädt...</p>
</div>

<div class="lib-grid">

  <!-- NEUESTE -->
  <div class="lib-col">
    <div class="col-header">
      <h2>Neueste Videos</h2>
      <span class="badge" id="newestCount">—</span>
    </div>
    <div class="video-list" id="newestList">
      <div class="loading">Lade neueste Videos</div>
    </div>
  </div>

  <!-- TOP VIEWS -->
  <div class="lib-col">
    <div class="col-header">
      <h2>Meistgesehen</h2>
      <span class="badge" id="topCount">—</span>
    </div>
    <div class="video-list" id="topList">
      <div class="loading">Lade Top-Videos</div>
    </div>
  </div>

</div>

<script>
const API = '/api';

const CATS = {
  gaming:    { label: 'Gaming',    color: '#e05565' },
  tutorial:  { label: 'Tutorial',  color: '#4a90d9' },
  nostalgie: { label: 'Nostalgie', color: '#e87c3e' },
  experiment:{ label: 'Experiment', color: '#9b6dff' },
  review:    { label: 'Review',     color: '#34d399' },
};

function getCatFromTitle(title) {
  const t = title.toLowerCase();
  if (t.includes('linux') || t.includes('tutorial') || t.includes('setup') || t.includes('installieren')) return 'tutorial';
  if (t.includes('nostalgie') || t.includes('retro') || t.includes('1990') || t.includes('2000')) return 'nostalgie';
  if (t.includes('review') || t.includes('test')) return 'review';
  if (t.includes('experiment')) return 'experiment';
  return 'gaming';
}

function formatViews(n) {
  if (!n || n === 0) return '—';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(0)+'K';
  return String(n);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
}

function makeVideoRow(v, rank, showThumb) {
  const cat = v.category || getCatFromTitle(v.title);
  const cfg = CATS[cat] || CATS.gaming;
  const views = v.views || 0;
  
  const rankEl = rank <= 3 
    ? `<span class="rank">${['🥇','🥈','🥉'][rank-1]}</span>` 
    : `<span class="rank">${rank}</span>`;
  
  const thumbEl = showThumb && v.thumbnail_url 
    ? `<span class="thumb"><img src="${v.thumbnail_url}" alt="" onerror="this.parent.innerHTML='<div class=\\'thumb-placeholder\\'>🎬</div>'"></span>`
    : (showThumb ? `<span class="thumb"><div class="thumb-placeholder">🎬</div></span>` : '');
  
  const dateStr = formatDate(v.publishedAt || v.published_date);
  
  return `
    <a class="video-row${rank <= 3 ? ' top3' : ''}" href="${v.youtube_url || '#'}" target="_blank" rel="noopener">
      ${rankEl}
      ${thumbEl}
      <span class="cat-dot ${cat}"></span>
      <span class="title" title="${v.title}">${v.title}</span>
      <div class="meta">
        <span class="views">${formatViews(views)}</span>
        ${dateStr ? `<span class="cat-badge ${cat}">${dateStr}</span>` : ''}
      </div>
    </a>
  `;
}

async function loadBibliothek() {
  document.querySelector('.lib-header p').textContent = 'Lade Daten...';
  
  try {
    const res = await fetch(`${API}/videos-with-stats`);
    if (!res.ok) throw new Error('API error');
    const videos = await res.json();
    
    document.querySelector('.lib-header p').textContent = `${videos.length} Videos — sortiert und übersichtlich`;
    
    // Assign categories
    videos.forEach(v => { v.category = getCatFromTitle(v.title); });
    
    // Neueste: sort by publishedAt desc (null dates go to end)
    const newest = [...videos]
      .filter(v => v.publishedAt || v.published_date)
      .sort((a, b) => {
        const da = new Date(a.publishedAt || a.published_date);
        const db = new Date(b.publishedAt || b.published_date);
        return db - da;
      })
      .slice(0, 10);
    
    // Top: sort by views desc
    const top = [...videos]
      .sort((a, b) => (b.views || 0) - (a.views || 0))
      .slice(0, 10);
    
    // Render newest
    const newestList = document.getElementById('newestList');
    if (newest.length === 0) {
      newestList.innerHTML = '<div class="empty">Keine Videos mit Datum</div>';
    } else {
      newestList.innerHTML = newest.map((v, i) => makeVideoRow(v, i+1, true)).join('');
    }
    document.getElementById('newestCount').textContent = newest.length;
    
    // Render top
    const topList = document.getElementById('topList');
    if (top.length === 0) {
      topList.innerHTML = '<div class="empty">Keine Videos</div>';
    } else {
      topList.innerHTML = top.map((v, i) => makeVideoRow(v, i+1, true)).join('');
    }
    document.getElementById('topCount').textContent = top.length;
    
  } catch(e) {
    document.querySelector('.lib-header p').textContent = 'Fehler beim Laden: ' + e.message;
    document.getElementById('newestList').innerHTML = '<div class="empty">Fehler: ' + e.message + '</div>';
    document.getElementById('topList').innerHTML = '<div class="empty">Fehler: ' + e.message + '</div>';
  }
}

loadBibliothek();
</script>

</body>
</html>
